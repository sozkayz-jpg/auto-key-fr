<!-- Google Analytics 4 - Auto-Key allo-cle-auto.fr -->
<!-- 
INSTRUCTIONS :
1. Creez une propriete sur https://analytics.google.com
2. Remplacez G-XXXXXXXXXX par votre identifiant de mesure
3. Copiez ce bloc dans le head de chaque page OU
   utilisez Google Tag Manager (recommande) :
   - Allez sur https://tagmanager.google.com
   - Creez un compte
   - Ajoutez l'ID GTM-XXXXXXX dans le <head> et <body>
-->

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX');
</script>
<!-- End Google Analytics -->
